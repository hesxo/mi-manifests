apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mi-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-user/mi-manifests.git
    targetRevision: main
    path: overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: mi-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
